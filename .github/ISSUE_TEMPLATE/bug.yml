name: Bug
description: Report incorrect behavior or a regression.
title: "fix: "
labels: ["type/bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact steps, data, command, or route that reproduces it.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area/api
        - area/web
        - area/rag
        - area/storage
        - area/docs
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority/p0
        - priority/p1
        - priority/p2
        - priority/p3
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Acceptance Checks
      description: Tests or manual checks that prove the bug is fixed.
